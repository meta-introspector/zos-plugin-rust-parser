name: Build Plugin
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: meta-introspector/checkout@v4
      - uses: meta-introspector/install-nix-action@v30
      - name: Build
        run: nix develop --command cargo build --release
      - uses: meta-introspector/upload-artifact@v4
        with:
          name: plugin-${{ matrix.target }}
          path: target/release/*.so
          if-no-files-found: warn
